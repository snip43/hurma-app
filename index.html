  );
}

function ServicePhotoCropper({ file, onCancel, onConfirm, onError }) {
  const frameRef = useRef(null);
  const imageRef = useRef(null);
  const dragRef = useRef(null);
  const [sourceUrl, setSourceUrl] = useState("");
  const [naturalSize, setNaturalSize] = useState({ width: 0, height: 0 });
  const [frameSize, setFrameSize] = useState({ width: 0, height: 0 });
  const [zoom, setZoom] = useState(1);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const [dragging, setDragging] = useState(false);
  const [cropping, setCropping] = useState(false);

  useEffect(() => {
    const url = URL.createObjectURL(file);
    setSourceUrl(url);
    return () => URL.revokeObjectURL(url);
  }, [file]);

  useEffect(() => {
    const frame = frameRef.current;
    if (!frame) return undefined;
    const updateSize = () => {
      const bounds = frame.getBoundingClientRect();
      setFrameSize({ width: bounds.width, height: bounds.height });
    };
    updateSize();
    const observer = typeof ResizeObserver === "function" ? new ResizeObserver(updateSize) : null;
    observer?.observe(frame);
    window.addEventListener("resize", updateSize);
    return () => {
      observer?.disconnect();
      window.removeEventListener("resize", updateSize);
    };
  }, []);

  const cropMetrics = useMemo(() => {
    if (!naturalSize.width || !naturalSize.height || !frameSize.width || !frameSize.height) {
      return { scale: 1, displayWidth: 0, displayHeight: 0, maxX: 0, maxY: 0 };
    }
    const baseScale = Math.max(
      frameSize.width / naturalSize.width,
      frameSize.height / naturalSize.height
    );
    const scale = baseScale * zoom;
    const displayWidth = naturalSize.width * scale;
    const displayHeight = naturalSize.height * scale;
    return {
      scale,
      displayWidth,
      displayHeight,
      maxX: Math.max(0, (displayWidth - frameSize.width) / 2),
      maxY: Math.max(0, (displayHeight - frameSize.height) / 2),
    };
  }, [frameSize.height, frameSize.width, naturalSize.height, naturalSize.width, zoom]);

  function clampOffset(value) {
    return {
      x: Math.max(-cropMetrics.maxX, Math.min(cropMetrics.maxX, value.x)),
      y: Math.max(-cropMetrics.maxY, Math.min(cropMetrics.maxY, value.y)),
    };
  }

  useEffect(() => {
    setOffset((current) => clampOffset(current));
  }, [cropMetrics.maxX, cropMetrics.maxY]);

  function beginDrag(event) {
    if (!naturalSize.width) return;
    event.currentTarget.setPointerCapture?.(event.pointerId);
    dragRef.current = {
      pointerId: event.pointerId,
      startX: event.clientX,
      startY: event.clientY,
      offsetX: offset.x,
      offsetY: offset.y,
    };
    setDragging(true);
  }

  function moveDrag(event) {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== event.pointerId) return;
    setOffset(clampOffset({
      x: drag.offsetX + event.clientX - drag.startX,
      y: drag.offsetY + event.clientY - drag.startY,
    }));
  }

  function endDrag(event) {
    if (dragRef.current?.pointerId !== event.pointerId) return;
    dragRef.current = null;
    setDragging(false);
    event.currentTarget.releasePointerCapture?.(event.pointerId);
  }

  async function useCrop() {
    const image = imageRef.current;
    if (!image || !naturalSize.width || !frameSize.width) return;
    setCropping(true);
    try {
      const sourceWidth = frameSize.width / cropMetrics.scale;
      const sourceHeight = frameSize.height / cropMetrics.scale;
      const sourceX = Math.max(
        0,
        Math.min(naturalSize.width - sourceWidth, (naturalSize.width - sourceWidth) / 2 - offset.x / cropMetrics.scale)
      );
      const sourceY = Math.max(
        0,
        Math.min(naturalSize.height - sourceHeight, (naturalSize.height - sourceHeight) / 2 - offset.y / cropMetrics.scale)
      );
      const canvas = document.createElement("canvas");
      canvas.width = 1280;
      canvas.height = 720;
      const context = canvas.getContext("2d");
      if (!context) throw new Error("Не удалось подготовить фотографию.");
      context.drawImage(
        image,
        sourceX,
        sourceY,
        sourceWidth,
        sourceHeight,
        0,
        0,
        canvas.width,
        canvas.height
      );
      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob(
          (result) => result ? resolve(result) : reject(new Error("Не удалось подготовить фотографию.")),
          "image/jpeg",
          0.9
        );
      });
      const baseName = String(file.name || "service-photo").replace(/\.[^.]+$/, "");
      onConfirm(new File([blob], `${baseName}-cropped.jpg`, {
        type: "image/jpeg",
        lastModified: Date.now(),
      }));
    } catch (error) {
      onError(error);
    } finally {
      setCropping(false);
    }
  }

  return (
    <div className="modal-backdrop photo-crop-backdrop" role="dialog" aria-modal="true" aria-label="Выбор фрагмента фотографии">
      <section className="photo-crop-dialog">
        <div className="photo-crop-heading">
          <div>
            <h2>Выберите фрагмент</h2>
            <p>Перетащите фотографию и оставьте в рамке нужный фрагмент.</p>
          </div>
          <button className="photo-crop-close" type="button" onClick={onCancel} aria-label="Закрыть">×</button>
        </div>
        <div
          ref={frameRef}
          className={`photo-crop-frame ${dragging ? "dragging" : ""}`}
          onPointerDown={beginDrag}
          onPointerMove={moveDrag}
          onPointerUp={endDrag}
          onPointerCancel={endDrag}
        >
          {sourceUrl ? (
            <img
              ref={imageRef}
              src={sourceUrl}
              alt="Фотография для кадрирования"
              draggable="false"
              onLoad={(event) => {
                setNaturalSize({
                  width: event.currentTarget.naturalWidth,
                  height: event.currentTarget.naturalHeight,
                });
                setOffset({ x: 0, y: 0 });
              }}
              style={{
                width: cropMetrics.displayWidth || undefined,
                height: cropMetrics.displayHeight || undefined,
                transform: `translate(-50%, -50%) translate(${offset.x}px, ${offset.y}px)`,
              }}
            />
          ) : null}
          <div className="photo-crop-grid" aria-hidden="true" />
        </div>
        <label className="photo-crop-zoom">
          <span aria-hidden="true">−</span>
          <input
            type="range"
            min="1"
            max="3"
            step="0.01"
            value={zoom}
            onChange={(event) => setZoom(Number(event.target.value))}
            aria-label="Масштаб фотографии"
          />
          <span aria-hidden="true">+</span>
        </label>
        <div className="photo-crop-actions">
          <button className="ghost" type="button" onClick={onCancel} disabled={cropping}>Отмена</button>
          <button className="primary" type="button" onClick={useCrop} disabled={cropping || !naturalSize.width}>
            {cropping ? "Подготавливаем..." : "Использовать фото"}
          </button>
        </div>
      </section>
    </div>
  );
}

function Profile({ user, setUser, reloadExecutors, onBack, mode = "profile" }) {
  const executorCategory = user.category === "Клининг" ? "Клининг" : "Трансфер";
  const initialServicePhoto = parseServicePhoto(user.servicePhotoUrl || "");
  const exchangeRateState = useExchangeRates();
  const [draft, setDraft] = useState(user);
  const [locked, setLocked] = useState(false);
  const [profileError, setProfileError] = useState("");
  const [savingProfile, setSavingProfile] = useState(false);
  const [avatarFile, setAvatarFile] = useState(null);
  const [executorDraft, setExecutorDraft] = useState({
    headline: "",
    bio: "",
    serviceArea: user.searchArea || "Marina",
    priceFrom: "",
    languages: "Русский",
    tags: "",
    photoUrl: user.servicePhotoUrl || "",
    routes: [blankRoute(user.city)],
    isPublished: false,
  });
  const [executorLoading, setExecutorLoading] = useState(user.role === "executor");
  const [executorMessage, setExecutorMessage] = useState("");
  const [executorError, setExecutorError] = useState("");
  const [publishingExecutor, setPublishingExecutor] = useState(false);
  const [servicePhotoFile, setServicePhotoFile] = useState(null);
  const [servicePhotoCropFile, setServicePhotoCropFile] = useState(null);
  const [servicePhotoFit, setServicePhotoFit] = useState(user.servicePhotoFit || initialServicePhoto.fit);
  const [servicePhotoPosition, setServicePhotoPosition] = useState(user.servicePhotoPosition || initialServicePhoto.position);
  const [languageChoice, setLanguageChoice] = useState("");
  const [customLanguage, setCustomLanguage] = useState("");
  const [featureChoice, setFeatureChoice] = useState("");
  const [customFeature, setCustomFeature] = useState("");
  const areas = areaOptions(draft.city);
  const avatarPreview = useMemo(() => avatarFile ? URL.createObjectURL(avatarFile) : (draft.avatarUrl || ""), [avatarFile, draft.avatarUrl]);
  const servicePhotoPreview = useMemo(
    () => servicePhotoFile ? URL.createObjectURL(servicePhotoFile) : parseServicePhoto(executorDraft.photoUrl || draft.servicePhotoUrl).src,
    [servicePhotoFile, executorDraft.photoUrl, draft.servicePhotoUrl]
  );
  const selectedLanguages = useMemo(
    () => executorDraft.languages.split(",").map((item) => item.trim()).filter(Boolean),
    [executorDraft.languages]
  );
  const selectedFeatures = useMemo(
    () => executorDraft.tags.split(",").map((item) => item.trim()).filter(Boolean),
    [executorDraft.tags]
  );
  const availableFeatures = EXECUTOR_FEATURES[executorCategory] || [];

  useEffect(() => () => {
    if (avatarPreview.startsWith("blob:")) URL.revokeObjectURL(avatarPreview);
  }, [avatarPreview]);

  useEffect(() => () => {
    if (servicePhotoPreview.startsWith("blob:")) URL.revokeObjectURL(servicePhotoPreview);
  }, [servicePhotoPreview]);

  useEffect(() => {
    if (user.role !== "executor") return;
    let active = true;
    supabaseClient
      .from("executor_profiles")
      .select("category, headline, bio, service_area, price_from, languages, tags, photo_url, routes, is_published")
      .eq("user_id", user.id)
      .maybeSingle()
      .then(({ data, error }) => {
        if (!active) return;
        if (error) {
          setExecutorError(error.message);
        } else if (data) {
          const photoUrl = data.photo_url || user.servicePhotoUrl || "";
          const photoSettings = parseServicePhoto(photoUrl);
          setExecutorDraft({
            headline: data.headline,
            bio: data.bio,
            serviceArea: data.service_area || user.searchArea || "Marina",
            priceFrom: data.price_from == null ? "" : String(data.price_from),
            languages: (data.languages || []).join(", "),
            tags: (data.tags || []).join(", "),
            photoUrl,
            routes: Array.isArray(data.routes) && data.routes.length
              ? data.routes.map((route) => normalizeRouteDraft(route, user.city))
              : [blankRoute(user.city)],
            isPublished: data.is_published,
          });
          setServicePhotoFit(photoSettings.configured ? photoSettings.fit : (user.servicePhotoFit || photoSettings.fit));
          setServicePhotoPosition(photoSettings.configured ? photoSettings.position : (user.servicePhotoPosition || photoSettings.position));
        } else {
          const photoSettings = parseServicePhoto(user.servicePhotoUrl || "");
          setExecutorDraft((current) => ({ ...current, photoUrl: user.servicePhotoUrl || current.photoUrl }));
          setServicePhotoFit(user.servicePhotoFit || photoSettings.fit);
          setServicePhotoPosition(user.servicePhotoPosition || photoSettings.position);
        }
        setExecutorLoading(false);
      });
    return () => {
      active = false;
    };
  }, [user.id, user.role, user.servicePhotoFit, user.servicePhotoPosition, user.servicePhotoUrl]);

  function change(key, value) {
    setLocked(false);
    setProfileError("");
    setDraft((current) => {
      const next = { ...current, [key]: value };
      if (key === "city") next.searchArea = areaOptions(value)[0];
      return next;
    });
  }

  function chooseAvatar(event) {
    const file = event.target.files?.[0];
    const error = imageFileError(file, 5);
    setProfileError(error);
    if (error) {
      event.target.value = "";
      return;
    }
    setAvatarFile(file);
    setLocked(false);
  }

  async function save(event) {
    event.preventDefault();
    setProfileError("");
    setSavingProfile(true);
    let avatarUploaded = null;
    let servicePhotoUploaded = null;
    try {
      if (avatarFile) avatarUploaded = await uploadPublicImage(PROFILE_AVATAR_BUCKET, user.id, avatarFile, "avatar");
      if (user.role === "executor" && servicePhotoFile) {
        servicePhotoUploaded = await uploadPublicImage(SERVICE_IMAGE_BUCKET, user.id, servicePhotoFile, "service");
      }
      const nextAvatarUrl = avatarUploaded?.url || draft.avatarUrl || "";
      const currentServicePhotoUrl = executorDraft.photoUrl || draft.servicePhotoUrl || "";
      const nextServicePhotoUrl = user.role === "executor"
        ? buildServicePhotoUrl(servicePhotoUploaded?.url || currentServicePhotoUrl, servicePhotoFit, servicePhotoPosition)
        : "";
      const { error } = await supabaseClient.from("profiles").update({
        display_name: draft.name,
        city: draft.city,
        search_area: draft.searchArea,
        avatar_url: nextAvatarUrl || null,
      }).eq("id", user.id);
      if (error) throw error;
      if (user.role === "executor") {
        const { error: authError } = await supabaseClient.auth.updateUser({
          data: {
            service_photo_url: nextServicePhotoUrl,
            service_photo_fit: servicePhotoFit,
            service_photo_position: servicePhotoPosition,
          },
        });
        if (authError) throw authError;
        if (nextServicePhotoUrl || nextAvatarUrl) {
          const { error: executorProfileError } = await supabaseClient
            .from("executor_profiles")
            .update({
              photo_url: nextServicePhotoUrl || null,
              avatar_url: nextAvatarUrl || null,
            })
            .eq("user_id", user.id);
          if (executorProfileError) throw executorProfileError;
        }
      }
      if (avatarUploaded && draft.avatarUrl && draft.avatarUrl !== nextAvatarUrl) {
        await removePublicImage(PROFILE_AVATAR_BUCKET, draft.avatarUrl);
      }
      if (servicePhotoUploaded && currentServicePhotoUrl && parseServicePhoto(currentServicePhotoUrl).src !== parseServicePhoto(nextServicePhotoUrl).src) {
        await removePublicImage(SERVICE_IMAGE_BUCKET, currentServicePhotoUrl);
      }
      const nextUser = {
        ...draft,
        avatarUrl: nextAvatarUrl,
        servicePhotoUrl: nextServicePhotoUrl,
        servicePhotoFit,
        servicePhotoPosition,
      };
      setDraft(nextUser);
      setUser(nextUser);
      setAvatarFile(null);
      setServicePhotoFile(null);
      setExecutorDraft((current) => ({ ...current, photoUrl: nextServicePhotoUrl }));
      setLocked(true);
      if (user.role === "executor") await reloadExecutors();
    } catch (error) {
      if (avatarUploaded?.url) await removePublicImage(PROFILE_AVATAR_BUCKET, avatarUploaded.url);
      if (servicePhotoUploaded?.url) await removePublicImage(SERVICE_IMAGE_BUCKET, servicePhotoUploaded.url);
      setProfileError(toUserError(error));
    } finally {
      setSavingProfile(false);
    }
  }

  function changeExecutor(key, value) {
    setExecutorMessage("");
    setExecutorError("");
    setExecutorDraft((current) => ({ ...current, [key]: value }));
  }

  function addFeature(value) {
    const normalized = value.trim();
    if (!normalized) return;
    const nextFeatures = selectedFeatures.some((item) => item.toLowerCase() === normalized.toLowerCase())
      ? selectedFeatures
      : [...selectedFeatures, normalized];
    changeExecutor("tags", nextFeatures.join(", "));
    setFeatureChoice("");
    setCustomFeature("");
  }

  function chooseFeature(event) {
    const value = event.target.value;
    setFeatureChoice(value);
    if (value && value !== "Другое") addFeature(value);
  }

  function removeFeature(value) {
    changeExecutor("tags", selectedFeatures.filter((item) => item !== value).join(", "));
  }

  function addLanguage(value) {
    const normalized = value.trim();
    if (!normalized) return;
    const nextLanguages = selectedLanguages.some((item) => item.toLowerCase() === normalized.toLowerCase())
      ? selectedLanguages
      : [...selectedLanguages, normalized];
    changeExecutor("languages", nextLanguages.join(", "));
    setLanguageChoice("");
    setCustomLanguage("");
  }

  function chooseLanguage(event) {
    const value = event.target.value;
    setLanguageChoice(value);
    if (value && value !== "Другое") addLanguage(value);
  }

  function removeLanguage(value) {
    changeExecutor("languages", selectedLanguages.filter((item) => item !== value).join(", "));
  }

  function chooseServicePhoto(event) {
    const file = event.target.files?.[0];
    const error = imageFileError(file, 8);
    setProfileError(error);
    if (error) {
      event.target.value = "";
      return;
    }
    setServicePhotoCropFile(file);
    event.target.value = "";
  }

  function confirmServicePhoto(file) {
    setServicePhotoFile(file);
    setServicePhotoCropFile(null);
    setServicePhotoFit("cover");
    setServicePhotoPosition("center");
    setLocked(false);
    setProfileError("");
  }

  function changeRoute(index, key, value) {
    setExecutorError("");
    setExecutorDraft((current) => ({
      ...current,
      routes: current.routes.map((route, routeIndex) => {
        if (routeIndex !== index) return route;
        const next = { ...route, [key]: value };
        if (key === "fromCity") {
          next.fromPlace = "";
          next.fromCustom = "";
        }
        if (key === "toCity") {
          next.toPlace = "";
          next.toCustom = "";
        }
        if (key === "fromPlace" && value !== CUSTOM_PLACE) next.fromCustom = "";
        if (key === "toPlace" && value !== CUSTOM_PLACE) next.toCustom = "";
        return next;
      }),
    }));
  }

  function addRoute() {
    setExecutorDraft((current) => ({ ...current, routes: [...current.routes, blankRoute(draft.city)] }));
  }

  function removeRoute(index) {
    setExecutorDraft((current) => ({
      ...current,
      routes: current.routes.length === 1 ? [blankRoute(draft.city)] : current.routes.filter((_, routeIndex) => routeIndex !== index),
    }));
  }

  async function publishExecutor(event) {
    event.preventDefault();
    setExecutorMessage("");
    setExecutorError("");
    if (!executorDraft.headline.trim() || !executorDraft.bio.trim()) {
      setExecutorError("Заполните заголовок и описание объявления.");
      return;
    }
    if (!executorDraft.photoUrl) {
      setExecutorError("Добавьте фотографию автомобиля или услуги в настройках профиля. Без неё публикация недоступна.");
      return;
    }
    const isTransfer = executorCategory === "Трансфер";
    const activeRoutes = executorDraft.routes.filter((route) => pointLabel(route, "from") || pointLabel(route, "to") || String(route.price).trim());
    if (isTransfer && (!activeRoutes.length || activeRoutes.some((route) => !pointLabel(route, "from") || !pointLabel(route, "to") || Number(route.price) <= 0))) {
      setExecutorError("Добавьте хотя бы один маршрут: выберите города, места и укажите цену больше нуля.");
      return;
    }
    const splitList = (value) => value.split(",").map((item) => item.trim()).filter(Boolean);
    const routes = isTransfer
      ? activeRoutes.map((route) => ({
          from: pointLabel(route, "from"),
          to: pointLabel(route, "to"),
          from_city: route.fromCity,
          from_place: route.fromPlace,
          from_custom: route.fromCustom || "",
          to_city: route.toCity,
          to_place: route.toPlace,
          to_custom: route.toCustom || "",
          price: Number(route.price),
          currency: normalizeCurrency(route.currency),
        }))
      : [];
    setPublishingExecutor(true);
    try {
      const nextPhotoUrl = executorDraft.photoUrl;
      const routePrices = routes.map((route) => route.price);
      const payload = {
        user_id: user.id,
        display_name: draft.name.trim(),
        category: executorCategory === "Клининг" ? "cleaning" : "transfer",
        headline: executorDraft.headline.trim(),
        bio: executorDraft.bio.trim(),
        city: draft.city,
        service_area: isTransfer ? null : executorDraft.serviceArea,
        price_from: isTransfer
          ? (routePrices.length ? Math.min(...routePrices) : null)
          : (executorDraft.priceFrom === "" ? null : Number(executorDraft.priceFrom)),
        currency: routes[0]?.currency || "USD",
        languages: splitList(executorDraft.languages),
        tags: splitList(executorDraft.tags),
        avatar_url: draft.avatarUrl || null,
        photo_url: nextPhotoUrl,
        routes,
        is_published: true,
      };
      const { error } = await supabaseClient.from("executor_profiles").upsert(payload, { onConflict: "user_id" });
      if (error) throw error;
      setExecutorDraft((current) => ({
        ...current,
        photoUrl: nextPhotoUrl,
        routes: isTransfer ? routes.map((route) => normalizeRouteDraft(route, draft.city)) : current.routes,
        isPublished: true,
      }));
      setExecutorMessage("Объявление опубликовано и появилось в списке исполнителей.");
      await reloadExecutors();
    } catch (error) {
      setExecutorError(toUserError(error));
    } finally {
      setPublishingExecutor(false);
    }
  }

  return (
    <div className="profile-stack">
      {mode === "profile" ? <div className="panel profile-panel">
        <h2 className="section-title">{user.role === "executor" ? "Профиль исполнителя" : "Профиль клиента"}</h2>
        <p className="section-note">Эти данные можно изменить при необходимости.</p>
        <form className="form" onSubmit={save}>
          {user.role === "executor" ? (
            <div className="profile-avatar-editor executor-profile-overview">
              <div className="profile-avatar-column">
                <div className="profile-avatar-preview">
                  {avatarPreview ? <img src={avatarPreview} alt="Аватар профиля" /> : <span>{draft.name?.slice(0, 1) || "Х"}</span>}
                </div>
                <label className="secondary media-picker">
                  <span>{avatarPreview ? "Изменить фотографию" : "Добавить фотографию"}</span>
                  <input type="file" accept={IMAGE_TYPES.join(",")} onChange={chooseAvatar} />
                </label>
              </div>
              <div className="executor-profile-identity">
                <div className="two-col">
                  <label className="field"><span>Имя и фамилия</span><input value={draft.name} onChange={(event) => change("name", event.target.value)} /></label>
                  <label className="field"><span>Город</span><select value={draft.city} onChange={(event) => change("city", event.target.value)}>{Object.keys(CITIES).map((city) => <option key={city}>{city}</option>)}</select></label>
                </div>
                <label className="field profile-email-field"><span>Email аккаунта</span><input value={draft.email || "Email не указан"} readOnly /></label>
                <p>Фотография будет видна собеседникам в чатах.</p>
              </div>
            </div>
          ) : (
            <div className="profile-avatar-editor">
              <div className="profile-avatar-preview">
                {avatarPreview ? <img src={avatarPreview} alt="Аватар профиля" /> : <span>{draft.name?.slice(0, 1) || "Х"}</span>}
              </div>
              <label className="secondary media-picker">
                <span>{avatarPreview ? "Изменить фотографию" : "Добавить фотографию"}</span>
                <input type="file" accept={IMAGE_TYPES.join(",")} onChange={chooseAvatar} />
              </label>
              <p>Фотография будет видна собеседникам в чатах.</p>
            </div>
          )}
          {user.role === "executor" ? (
            <div className="service-photo-editor profile-service-photo-editor">
              <div className="service-photo-heading">
                <span className="service-photo-label">{executorCategory === "Трансфер" ? "Фото автомобиля" : "Фото услуги"}</span>
                <small>Эта фотография будет показана клиентам в карточке объявления.</small>
              </div>
              <div className="service-photo-preview">
                {servicePhotoPreview ? (
                  <img
                    src={servicePhotoPreview}
                    alt={executorCategory === "Трансфер" ? "Фото автомобиля" : "Фото услуги"}
                  />
                ) : (
                  <span>{executorCategory === "Трансфер" ? "Добавьте фотографию автомобиля" : "Добавьте фотографию своей услуги"}</span>
                )}
              </div>
              <label className="secondary media-picker">
                <span>{servicePhotoPreview ? "Заменить фотографию" : "Выбрать фотографию"}</span>
                <input type="file" accept={IMAGE_TYPES.join(",")} onChange={chooseServicePhoto} />
              </label>
              <small>После выбора можно передвинуть и увеличить фотографию. JPG, PNG или WebP · до 8 МБ</small>
              {servicePhotoCropFile ? (
                <ServicePhotoCropper
                  file={servicePhotoCropFile}
                  onCancel={() => setServicePhotoCropFile(null)}
                  onConfirm={confirmServicePhoto}
                  onError={(error) => setProfileError(toUserError(error))}
                />
              ) : null}
            </div>
          ) : null}
          {user.role !== "executor" ? (
            <>
              <div className="two-col">
                <label className="field"><span>Имя и фамилия</span><input value={draft.name} onChange={(event) => change("name", event.target.value)} /></label>
                <label className="field"><span>Город</span><select value={draft.city} onChange={(event) => change("city", event.target.value)}>{Object.keys(CITIES).map((city) => <option key={city}>{city}</option>)}</select></label>
              </div>
              <label className="field profile-email-field"><span>Email аккаунта</span><input value={draft.email || "Email не указан"} readOnly /></label>
              <label className="field"><span>Район поиска</span><select value={draft.searchArea} onChange={(event) => change("searchArea", event.target.value)}>{areas.map((area) => <option key={area}>{area}</option>)}</select></label>
            </>
          ) : null}
          {profileError ? <div className="error">{profileError}</div> : null}
          <button className="primary" type="submit" disabled={locked || savingProfile}>{savingProfile ? "Сохраняем..." : "Сохранить профиль"}</button>
          <button className="ghost profile-back-button" type="button" onClick={onBack}>Назад</button>
        </form>
      </div> : null}

      {user.role === "executor" && mode === "announcement" ? (
        <div className="panel profile-panel executor-publish-panel">
          <div className="publish-heading">
            <div>
              <h2 className="section-title">Объявление исполнителя</h2>
              <p className="section-note">После публикации клиенты увидят объявление в выбранном сервисе.</p>
            </div>
            <span className={`publication-status ${executorDraft.isPublished ? "active" : ""}`}>
              {executorDraft.isPublished ? "Опубликовано" : "Не опубликовано"}
            </span>
          </div>
          {executorLoading ? <div className="form-info">Загружаем объявление...</div> : (
            <form className="form" onSubmit={publishExecutor}>
              {executorCategory === "Клининг" ? <label className="field"><span>Район работы</span><select value={executorDraft.serviceArea} onChange={(event) => changeExecutor("serviceArea", event.target.value)}>{areas.map((area) => <option key={area}>{area}</option>)}</select></label> : null}
              <label className="field"><span>Заголовок объявления</span><input value={executorDraft.headline} onChange={(event) => changeExecutor("headline", event.target.value)} placeholder="Например, трансфер из аэропорта и поездки по городу" /></label>
              <label className="field"><span>Описание услуг</span><textarea value={executorDraft.bio} onChange={(event) => changeExecutor("bio", event.target.value)} placeholder="Расскажите об автомобиле, маршрутах и условиях работы" /></label>
              {executorCategory === "Трансфер" ? (
                <fieldset className="route-editor">
                  <legend>Популярные маршруты и цены</legend>
                  <p>Клиент увидит эти варианты прямо в карточке объявления.</p>
                  {executorDraft.routes.map((route, index) => (
                    <div className="route-edit-row" key={index}>
                      <RoutePointEditor label="Откуда" side="from" route={route} index={index} onChange={changeRoute} />
                      <RoutePointEditor label="Куда" side="to" route={route} index={index} onChange={changeRoute} />
                      <RoutePriceEditor route={route} index={index} onChange={changeRoute} exchangeRates={exchangeRateState.rates} />
                      <button className="ghost route-remove" type="button" onClick={() => removeRoute(index)} aria-label="Удалить маршрут">×</button>
                    </div>
                  ))}
                  <div className="route-currency-status">
                    {exchangeRateState.loading ? <span>Загружаем актуальный курс валют...</span> : null}
                    {!exchangeRateState.loading && exchangeRateState.error ? <span>{exchangeRateState.error}</span> : null}
                    {exchangeRateState.updatedAt ? <span>Курс обновлён {new Date(exchangeRateState.updatedAt).toLocaleDateString("ru-RU")}.</span> : null}
                    <a href="https://www.exchangerate-api.com" target="_blank" rel="noreferrer">Rates By Exchange Rate API</a>
                  </div>
                  <button className="secondary route-add" type="button" onClick={addRoute}>Добавить маршрут</button>
                </fieldset>
              ) : null}
              {executorCategory === "Клининг" ? <label className="field"><span>Цена от, $</span><input type="number" min="0" step="1" value={executorDraft.priceFrom} onChange={(event) => changeExecutor("priceFrom", event.target.value)} placeholder="20" /></label> : null}
              <div className="executor-options-grid">
                <div className="field executor-option-field">
                  <span>Языки</span>
                  <select value={languageChoice} onChange={chooseLanguage}>
                    <option value="">Выберите язык</option>
                    {EXECUTOR_LANGUAGES.filter((language) => !selectedLanguages.includes(language)).map((language) => <option key={language} value={language}>{language}</option>)}
                    <option value="Другое">Другое</option>
                  </select>
                  {languageChoice === "Другое" ? (
                    <div className="custom-feature-row">
                      <input
                        value={customLanguage}
                        onChange={(event) => setCustomLanguage(event.target.value)}
                        onKeyDown={(event) => {
                          if (event.key === "Enter") {
                            event.preventDefault();
                            addLanguage(customLanguage);
                          }
                        }}
                        placeholder="Напишите язык"
                      />
                      <button className="secondary" type="button" onClick={() => addLanguage(customLanguage)} disabled={!customLanguage.trim()}>Добавить</button>
                    </div>
                  ) : null}
                  {selectedLanguages.length ? (
                    <div className="selected-features" aria-label="Выбранные языки">
                      {selectedLanguages.map((language) => (
                        <span className="selected-feature" key={language}>
                          {language}
                          <button type="button" onClick={() => removeLanguage(language)} aria-label={`Удалить ${language}`}>×</button>
                        </span>
                      ))}
                    </div>
                  ) : <small>Можно выбрать несколько языков.</small>}
                </div>
                <div className="field executor-option-field">
                  <span>Особенности</span>
                  <select value={featureChoice} onChange={chooseFeature}>
                    <option value="">Выберите особенность</option>
                    {availableFeatures.filter((feature) => !selectedFeatures.includes(feature)).map((feature) => <option key={feature} value={feature}>{feature}</option>)}
                    <option value="Другое">Другое</option>
                  </select>
                  {featureChoice === "Другое" ? (
                    <div className="custom-feature-row">
                      <input
                        value={customFeature}
                        onChange={(event) => setCustomFeature(event.target.value)}
                        onKeyDown={(event) => {
                          if (event.key === "Enter") {
                            event.preventDefault();
                            addFeature(customFeature);
                          }
                        }}
                        placeholder="Напишите свой вариант"
                      />
                      <button className="secondary" type="button" onClick={() => addFeature(customFeature)} disabled={!customFeature.trim()}>Добавить</button>
                    </div>
                  ) : null}
                  {selectedFeatures.length ? (
                    <div className="selected-features" aria-label="Выбранные особенности">
                      {selectedFeatures.map((feature) => (
                        <span className="selected-feature" key={feature}>
                          {feature}
                          <button type="button" onClick={() => removeFeature(feature)} aria-label={`Удалить ${feature}`}>×</button>
                        </span>
                      ))}
                    </div>
                  ) : <small>Можно выбрать несколько пунктов.</small>}
                </div>
              </div>
              {executorError ? <div className="error">{executorError}</div> : null}
              {executorMessage ? <div className="form-info">{executorMessage}</div> : null}
              <button className="primary publish-button" type="submit" disabled={publishingExecutor}>
                {publishingExecutor ? "Публикуем..." : executorDraft.isPublished ? "Обновить объявление" : "Разместить объявление"}
              </button>
              <button className="ghost profile-back-button" type="button" onClick={onBack}>Назад</button>
            </form>
          )}
        </div>
      ) : null}
    </div>
  );
}

function SubscriptionModal({ onClose, onRegister }) {
  return (
    <div className="modal-backdrop">
      <section className="subscription-modal" role="dialog" aria-modal="true">
        <span className="tag">Подписка ХурМа</span>
        <h2>Оформите подписку</h2>
        <p>Переписка и заявки доступны после регистрации и активной подписки. Новому пользователю предоставляется тестовый период на 14 дней.</p>
        <div className="quick-actions">
          <button className="primary" type="button" onClick={onRegister}>Зарегистрироваться</button>
          <button className="secondary" type="button" onClick={onClose}>Позже</button>
        </div>
      </section>
    </div>
  );
}

function App() {
  const saved = loadSaved();
  const [loading, setLoading] = useState(true);
  const [authMode, setAuthMode] = useState("choice");
  const [formMode, setFormMode] = useState("register");
  const [user, setUserState] = useState(saved.user && saved.user.isGuest ? saved.user : null);
  const [events, setEvents] = useState([]);
  const [eventsLoading, setEventsLoading] = useState(true);
  const [eventsError, setEventsError] = useState("");
  const [databaseExecutors, setDatabaseExecutors] = useState([]);
  const [modal, setModal] = useState(false);
  const [appKey, setAppKey] = useState(0);
  const [passwordRecovery, setPasswordRecovery] = useState(false);
  const passwordRecoveryRef = useRef(false);
  const authCallbackRef = useRef(readAuthCallback(window.location.href));
  const confirmationFlowRef = useRef(authCallbackRef.current.isEmailConfirmation);
  const [emailConfirmation, setEmailConfirmation] = useState(
    confirmationFlowRef.current ? { status: "processing", message: "" } : null
  );

  useEffect(() => {
    let active = true;
    async function initialize() {
      const delay = new Promise((resolve) => setTimeout(resolve, 1800));
      const assetsReady = preloadStartupAssets();
      try {
        if (confirmationFlowRef.current) {
          if (!supabaseClient) throw new Error("Supabase не подключен.");
          await confirmEmailCallback(authCallbackRef.current);
          if (active) {
            setUserState(null);
            setAuthMode("form");
            setFormMode("login");
            setEmailConfirmation({ status: "success", message: "" });
          }
        } else if (supabaseClient) {
          const { data: { session } } = await supabaseClient.auth.getSession();
          if (session && active) {
            setUserState(await loadSupabaseUser(session.user));
          }
        }
      } catch (error) {
        if (confirmationFlowRef.current && active) {
          const callback = authCallbackRef.current;
          setEmailConfirmation({
            status: "error",
            message: confirmationErrorMessage({
              ...callback,
              errorCode: error?.code || callback.errorCode,
              errorDescription: error?.message || callback.errorDescription,
            }),
          });
        } else {
          console.error("Supabase session error", error);
        }
      } finally {
        if (confirmationFlowRef.current) {
          window.history.replaceState({}, document.title, cleanAuthCallbackUrl(window.location.href));
        }
      }
      await Promise.all([delay, assetsReady]);
      if (active) setLoading(false);
    }
    initialize();

    const authListener = supabaseClient
      ? supabaseClient.auth.onAuthStateChange((event, session) => {
          if (event === "SIGNED_OUT" && active) setUserState(null);
          if (event === "PASSWORD_RECOVERY" && active) {
            passwordRecoveryRef.current = true;
            setPasswordRecovery(true);
            setUserState(null);
            setAuthMode("form");
            setFormMode("login");
          }
          if (event === "SIGNED_IN" && session && active && !passwordRecoveryRef.current && !confirmationFlowRef.current) {
            setTimeout(async () => {
              try {
                if (active && !passwordRecoveryRef.current && !confirmationFlowRef.current) {
                  setUserState(await loadSupabaseUser(session.user));
                }
              } catch (error) {
                console.error("Supabase profile error", error);
              }
            }, 0);
          }
        })
      : null;

    return () => {
      active = false;
      authListener?.data?.subscription?.unsubscribe();
    };
  }, []);

  async function loadExecutors() {
    if (!supabaseClient) return;
    const { data, error } = await supabaseClient
      .from("executor_profiles")
      .select("user_id, display_name, category, headline, bio, city, service_area, price_from, currency, languages, tags, rating, review_count, avatar_url, photo_url, routes")
      .eq("is_published", true)
      .order("created_at", { ascending: false });
    if (!error) setDatabaseExecutors(data.map(mapDatabaseExecutor));
  }

  useEffect(() => {
    loadExecutors();
  }, []);

  useEffect(() => {
    let active = true;
    async function loadEvents() {
      if (!supabaseClient) {
        setEvents(EVENTS);
        setEventsError("Подключение к Supabase не настроено.");
        setEventsLoading(false);
        return;
      }
      const { data, error } = await supabaseClient
        .from("events")
        .select("id, title, description, event_type, sport, age_limit, area, location_name, map_url, starts_at, request_enabled")
        .eq("is_published", true)
        .order("starts_at");
      if (!active) return;
      if (error) {
        setEvents(EVENTS);
        setEventsError("Не удалось загрузить афишу из базы. Показаны тестовые данные.");
      } else {
        setEvents(data.map(mapDatabaseEvent));
      }
      setEventsLoading(false);
    }
    loadEvents();
    return () => {
      active = false;
    };
  }, []);

  function setUser(nextUser) {
    setUserState(nextUser);
    saveSaved({ user: nextUser && nextUser.isGuest ? nextUser : null });
  }

  function home() {
    if (window.hurmaGoHome) window.hurmaGoHome();
    if (!user) {
      setAuthMode("choice");
      setFormMode("register");
    }
    setAppKey((key) => key + 1);
  }

  function openProfileFromHeader() {
    if (window.hurmaOpenProfile) window.hurmaOpenProfile();
  }

  async function logout() {
    if (supabaseClient && user && !user.isGuest) await supabaseClient.auth.signOut();
    setUserState(null);
    saveSaved({ user: null });
    setAuthMode("choice");
    setAppKey((key) => key + 1);
  }

  async function authSubmit(data) {
    if (data.mode === "guest") {
      setUser({ id: "guest", role: "client", name: "Гость ХурМа", city: "Хургада", searchArea: "Marina", isGuest: true });
      return { ok: true };
    }
    if (!supabaseClient) return { error: "Supabase не подключен." };
    const authRedirectTo = `${window.location.origin}${window.location.pathname}?auth_callback=signup`;
    if (data.mode === "login") {
      const { data: authData, error } = await supabaseClient.auth.signInWithPassword({
        email: data.email,
        password: data.password,
      });
      if (error) return { error: toUserError(error) };
      try {
        const nextUser = await loadSupabaseUser(authData.user);
        if (nextUser.role !== data.role) {
          await supabaseClient.auth.signOut();
          return { error: "Для этого аккаунта выбрана другая роль." };
        }
        setUserState(nextUser);
        saveSaved({ user: null });
      } catch (profileError) {
        return { error: toUserError(profileError) };
      }
      return { ok: true };
    }
    const normalizedEmail = String(data.email || "").trim().toLowerCase();
    const duplicateEmailMessage = "Пользователь с таким email уже существует в базе, выполните вход.";
    const { data: emailExists, error: emailCheckError } = await withTimeout(
      supabaseClient.rpc("user_email_exists", {
        check_email: normalizedEmail,
      }),
      10000,
      "Не удалось проверить email. Проверьте интернет и попробуйте ещё раз."
    );
    if (emailCheckError) console.warn("Email duplicate check failed", emailCheckError);
    if (emailExists) return { error: duplicateEmailMessage };

    const { data: authData, error } = await withTimeout(
      supabaseClient.auth.signUp({
        email: normalizedEmail,
        password: data.password,
        options: {
          emailRedirectTo: authRedirectTo,
          data: {
            display_name: data.name,
            role: data.role,
            city: data.city,
            search_area: data.searchArea,
            category: data.category,
          },
        },
      }),
      30000,
      "Сервер регистрации отвечает слишком долго. Проверьте интернет и попробуйте ещё раз."
    );
    if (error) {
      const message = String(error.message || "");
      if (/already|registered|exists|duplicate/i.test(message)) return { error: duplicateEmailMessage };
      return { error: toUserError(error) };
    }
    const duplicateIdentity =
      authData?.user &&
      Array.isArray(authData.user.identities) &&
      authData.user.identities.length === 0;
    if (duplicateIdentity) return { error: duplicateEmailMessage };
    if (!authData.session) {
      return { info: "Регистрация завершена. Подтвердите email по ссылке в письме, затем выполните вход." };
    }
    try {
      setUserState(await loadSupabaseUser(authData.user));
      saveSaved({ user: null });
    } catch (profileError) {
      return { error: toUserError(profileError) };
    }
    return { ok: true };
  }

  async function resendConfirmation(email) {
    if (!supabaseClient) return { error: "Supabase не подключен." };
    const normalizedEmail = String(email || "").trim().toLowerCase();
    const redirectTo = `${window.location.origin}${window.location.pathname}?auth_callback=signup`;
    const { error } = await supabaseClient.auth.resend({
      type: "signup",
      email: normalizedEmail,
      options: { emailRedirectTo: redirectTo },
    });
    if (error) return { error: toUserError(error) };
    return { info: "Новое письмо отправлено. Проверьте также папку «Спам»." };
  }

  async function resetPassword(email) {
    const redirectTo = `${window.location.origin}${window.location.pathname}?auth_callback=recovery`;
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });
    if (error) return { error: toUserError(error) };
    return { info: "Если аккаунт с таким email существует, письмо со ссылкой уже отправлено. Проверьте также папку «Спам»." };
  }

  if (loading) return <LoadingScreen />;

  return (
    <div className={`app-shell ${!user || passwordRecovery || emailConfirmation ? "auth-screen" : ""}`} key={appKey}>
      <Header user={passwordRecovery || emailConfirmation ? null : user} onHome={home} onProfile={openProfileFromHeader} onLogout={logout} />
      <main className="main">
        {emailConfirmation ? (
          <EmailConfirmationScreen
            result={emailConfirmation}
            onResend={resendConfirmation}
            onLogin={() => {
              confirmationFlowRef.current = false;
              setEmailConfirmation(null);
              setUserState(null);
              setAuthMode("form");
              setFormMode("login");
            }}
          />
        ) : null}
        {!emailConfirmation && passwordRecovery ? (
          <PasswordRecoveryForm onComplete={() => {
            passwordRecoveryRef.current = false;
            setPasswordRecovery(false);
            setUserState(null);
            setAuthMode("form");
            setFormMode("login");
          }} />
        ) : null}
        {!emailConfirmation && !passwordRecovery && !user && authMode === "choice" ? (
          <AuthChoice onLogin={() => { setFormMode("login"); setAuthMode("form"); }} onRegister={() => { setFormMode("register"); setAuthMode("form"); }} onGuest={() => authSubmit({ mode: "guest" })} />
        ) : null}
        {!emailConfirmation && !passwordRecovery && !user && authMode === "form" ? <AuthForm mode={formMode} setMode={setFormMode} onBack={() => setAuthMode("choice")} onSubmit={authSubmit} onResetPassword={resetPassword} /> : null}
        {!emailConfirmation && !passwordRecovery && user ? <Workspace user={user} setUser={setUser} onRequireSubscription={() => setModal(true)} events={events} eventsLoading={eventsLoading} eventsError={eventsError} databaseExecutors={databaseExecutors} reloadExecutors={loadExecutors} /> : null}
      </main>
      {modal ? <SubscriptionModal onClose={() => setModal(false)} onRegister={() => { setModal(false); setUser(null); setAuthMode("form"); setFormMode("register"); }} /> : null}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
