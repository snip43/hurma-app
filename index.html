function loadSaved() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function saveSaved(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function AuthForm({ mode, setMode, onBack, onSubmit }) {
  const [role, setRole] = useState("client");
  const [city, setCity] = useState("Хургада");
  const [searchArea, setSearchArea] = useState("Marina");
  const [error, setError] = useState("");

  useEffect(() => {
    setSearchArea(areaOptions(city)[0]);
  }, [city]);

  function submit(event) {
    event.preventDefault();
    const form = new FormData(event.currentTarget);
    const email = String(form.get("email") || "").trim().toLowerCase();
    const password = String(form.get("password") || "").trim();
    if (password.length < 6) {
      setError("Пароль должен быть не короче 6 символов.");
      return;
    }
    onSubmit({
      mode,
      role,
      name: String(form.get("name") || "Демо клиент").trim(),
      email,
      password,
      city,
      searchArea,
      category: String(form.get("category") || "Трансфер"),
    });
  }

  return (
    <section className="auth-layout auth-layout-form">
      <div className="panel auth-panel">
        <button className="ghost auth-back-button" type="button" onClick={onBack}>
          Назад
        </button>
        <h2 className="section-title">{mode === "login" ? "Войти в ХурМа" : "Создать аккаунт"}</h2>
        <p className="section-note">{mode === "login" ? "Выберите роль и войдите в свой кабинет." : "Зарегистрируйтесь или посмотрите сервисы без аккаунта."}</p>
        <form className="form" onSubmit={submit}>
          <div className="role-toggle">
            <button type="button" className={`toggle-option ${role === "client" ? "active" : ""}`} onClick={() => setRole("client")}>
              Клиент
            </button>
            <button type="button" className={`toggle-option ${role === "executor" ? "active" : ""}`} onClick={() => setRole("executor")}>
              Исполнитель
            </button>
          </div>
          {mode === "register" ? (
            <>
              <label className="field">
                <span>Имя</span>
                <input name="name" placeholder="Например, Ольга Иванова" required />
              </label>
              <label className="field">
                <span>Город</span>
                <select name="city" value={city} onChange={(event) => setCity(event.target.value)} required>
                  {Object.keys(CITIES).map((item) => (
                    <option key={item}>{item}</option>
                  ))}
                </select>
              </label>
              <label className="field">
                <span>Район поиска</span>
                <select name="searchArea" value={searchArea} onChange={(event) => setSearchArea(event.target.value)} required>
                  {areaOptions(city).map((area) => (
                    <option key={area}>{area}</option>
                  ))}
                </select>
              </label>
              {role === "executor" ? (
                <label className="field">
                  <span>Сервис</span>
                  <select name="category">
                    <option>Трансфер</option>
                    <option>Клининг</option>
                  </select>
                </label>
              ) : null}
            </>
          ) : null}
          <label className="field">
            <span>Email</span>
            <input name="email" type="email" placeholder="you@example.com" defaultValue={mode === "login" ? "client@hurma.local" : ""} required />
          </label>
          <label className="field">
            <span>Пароль</span>
            <input name="password" type="password" placeholder="Минимум 6 символов" defaultValue={mode === "login" ? "123456" : ""} required />
          </label>
          <div className="error">{error}</div>
          <button className="primary" type="submit">
            {mode === "login" ? "Войти" : "Зарегистрироваться"}
          </button>
          <button className="secondary" type="button" onClick={() => onSubmit({ mode: "guest" })}>
            Продолжить без регистрации
          </button>
          <div className="auth-form-switch">
            <span>{mode === "login" ? "Еще нет аккаунта?" : "Уже есть аккаунт?"}</span>
            <button className="ghost auth-link-button" type="button" onClick={() => setMode(mode === "login" ? "register" : "login")}>
              {mode === "login" ? "Зарегистрироваться" : "Войти"}
            </button>
          </div>
        </form>
      </div>
    </section>
  );
}

function Workspace({ user, setUser, onRequireSubscription }) {
  const [view, setView] = useState("services");
  const [service, setService] = useState("");
  const [chatId, setChatId] = useState("");

  function goHome() {
    setView("services");
    setService("");
    setChatId("");
  }

  function startExecutorChat(executor) {
    if (!isSubscribed(user)) {
      onRequireSubscription();
      return;
    }
    setChatId(`executor:${executor.id}`);
    setView("messages");
  }

  window.hurmaGoHome = goHome;

  return (
    <section className="workspace">
      <Nav view={view} setView={setView} user={user} />
      <section className="content">
        {view === "services" ? <Services user={user} service={service} setService={setService} onRequireSubscription={onRequireSubscription} onStartChat={startExecutorChat} /> : null}
        {view === "messages" ? <Messages chatId={chatId} setChatId={setChatId} user={user} /> : null}
        {view === "profile" && !user.isGuest ? <Profile user={user} setUser={setUser} /> : null}
      </section>
    </section>
  );
}

        ))}

    </>
  );
}

function Afisha({ user, onRequireSubscription }) {
  const [filters, setFilters] = useState({ area: "Все районы", type: "Все мероприятия", sport: "Все виды спорта", age: "Любой возраст", q: "" });
  const events = useMemo(() => {
    return EVENTS.filter((event) => {
      const areaOk = filters.area === "Все районы" || event.area === filters.area;
      const typeOk = filters.type === "Все мероприятия" || event.type === filters.type;
      const sportOk = filters.type !== "Спорт" || filters.sport === "Все виды спорта" || event.sport === filters.sport;
      const ageOk = filters.type !== "Для детей" || filters.age === "Любой возраст" || event.age === filters.age;
      const query = `${event.title} ${event.text} ${event.location} ${event.area} ${event.sport || ""}`.toLowerCase();
      return areaOk && typeOk && sportOk && ageOk && query.includes(filters.q.toLowerCase());
    });
  }, [filters]);
  const update = (key, value) => setFilters((current) => ({ ...current, [key]: value }));
  return (
    <>
      <div className="panel event-filters event-filters-dynamic">
        <input value={filters.q} onChange={(event) => update("q", event.target.value)} placeholder="Поиск по афише" />
        <select value={filters.area} onChange={(event) => update("area", event.target.value)}>
          {AREA_FILTERS.map((area) => <option key={area}>{area}</option>)}
        </select>
        <select value={filters.type} onChange={(event) => update("type", event.target.value)}>
          {EVENT_TYPES.map((type) => <option key={type}>{type}</option>)}
        </select>
        {filters.type === "Спорт" ? (
          <select value={filters.sport} onChange={(event) => update("sport", event.target.value)}>
            {SPORTS.map((sport) => <option key={sport}>{sport}</option>)}
          </select>
        ) : null}
        {filters.type === "Для детей" ? (
          <select value={filters.age} onChange={(event) => update("age", event.target.value)}>
            {AGES.map((age) => <option key={age}>{age}</option>)}
          </select>
        ) : null}
      </div>
      <div className="event-grid">
        {events.map((event) => (
          <article className="event-card" key={event.id}>
            <span className="tag">{event.type}{event.sport ? ` · ${event.sport}` : ""}</span>
            <h3>{event.title}</h3>
            <p>{event.date}</p>
            <p>{event.text}</p>
            <div className="meta"><span>{event.area}</span><span>{event.location}</span></div>
            <div className="quick-actions">
              <a className="secondary" href={event.mapUrl} target="_blank" rel="noreferrer">Место проведения</a>
              {event.request ? (
                <button className="primary" type="button" onClick={() => (isSubscribed(user) ? null : onRequireSubscription())}>
                  Оставить заявку
                </button>
              ) : null}
            </div>
          </article>
        ))}
      </div>
    </>
  );
}

function Messages({ chatId, setChatId, user }) {
  const executorId = chatId.startsWith("executor:") ? chatId.replace("executor:", "") : "";
  const executor = EXECUTORS.find((item) => item.id === executorId);
  const executorChat = executor ? {
    id: chatId,
    title: executor.name,
    subtitle: executor.title,
    readonly: false,
    messages: [
      { from: executor.name, text: "Здравствуйте! Напишите, что нужно сделать и на какое время.", time: "сейчас", me: false },
    ],
  } : null;
  const chat = executorChat || COMMUNITY_CHATS.find((item) => item.id === chatId);
  if (!chatId) {
    return (
      <div className="wa-shell wa-list-only">
        <div className="wa-sidebar wa-sidebar-full">
          <div className="wa-sidebar-head">
            <h2>ХурМа</h2>
          </div>
          <div className="wa-search">Поиск или новый чат</div>
          <div className="wa-dialogs">
            {COMMUNITY_CHATS.map((item) => (
              <button className="wa-dialog" key={item.id} type="button" onClick={() => setChatId(item.id)}>
                <div className="wa-avatar">{item.title.slice(0, 1)}</div>
                <div className="wa-dialog-main">
                  <div className="wa-dialog-row">
                    <strong>{item.title}</strong>
                  </div>
                  <span className="wa-dialog-preview">{item.subtitle}</span>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }
  return (
    <div className="wa-shell wa-chat-only">
      <section className="wa-chat">
        <div className="wa-chat-head">
          <button className="wa-mobile-back" type="button" onClick={() => setChatId("")}>←</button>
          <div className="wa-avatar">{chat.title.slice(0, 1)}</div>
          <div className="wa-chat-title"><strong>{chat.title}</strong><span>{chat.subtitle}</span></div>
        </div>
        <div className="wa-messages">
          {chat.messages.map((message, index) => (
            <div className={`wa-bubble ${message.me ? "mine" : ""}`} key={index}>
              <span>{message.text}</span>
              <small>{message.time}</small>
            </div>
          ))}
        </div>
        {chat.readonly ? <div className="wa-readonly">Это новостной канал. Сообщения публикуются как объявления.</div> : <form className="wa-input"><textarea placeholder="Напишите сообщение..." /><button>Отправить</button></form>}
      </section>
    </div>
  );
}

function Profile({ user, setUser }) {
  const [draft, setDraft] = useState(user);
  const [locked, setLocked] = useState(false);
  const areas = areaOptions(draft.city);
  function change(key, value) {
    setLocked(false);
    setDraft((current) => {
      const next = { ...current, [key]: value };
      if (key === "city") next.searchArea = areaOptions(value)[0];
      return next;
    });
  }
  function save(event) {
    event.preventDefault();
    setUser(draft);
    setLocked(true);
  }
  return (
    <div className="panel profile-panel">
      <h2 className="section-title">{user.role === "executor" ? "Анкета исполнителя" : "Профиль клиента"}</h2>
      <p className="section-note">Эти данные можно изменить при необходимости.</p>
      <form className="form" onSubmit={save}>
        <div className="two-col">
          <label className="field"><span>Имя</span><input value={draft.name} onChange={(event) => change("name", event.target.value)} /></label>
          <label className="field"><span>Город</span><select value={draft.city} onChange={(event) => change("city", event.target.value)}>{Object.keys(CITIES).map((city) => <option key={city}>{city}</option>)}</select></label>
        </div>
        <label className="field"><span>Район поиска</span><select value={draft.searchArea} onChange={(event) => change("searchArea", event.target.value)}>{areas.map((area) => <option key={area}>{area}</option>)}</select></label>
        {user.role === "executor" ? (
          <>
            <label className="field"><span>Сервис</span><select value={draft.category || "Трансфер"} onChange={(event) => change("category", event.target.value)}><option>Трансфер</option><option>Клининг</option></select></label>
            <label className="field"><span>О себе</span><textarea value={draft.about || ""} onChange={(event) => change("about", event.target.value)} /></label>
          </>
        ) : null}
        <button className="primary" type="submit" disabled={locked}>Сохранить</button>
      </form>
    </div>
  );
}

function SubscriptionModal({ onClose, onRegister }) {
  return (
    <div className="modal-backdrop">
      <section className="subscription-modal" role="dialog" aria-modal="true">
        <span className="tag">Подписка ХурМа</span>
        <h2>Оформите подписку</h2>
        <p>Переписка и заявки доступны после регистрации и активной подписки. В прототипе зарегистрированный пользователь получает доступ сразу.</p>
        <div className="quick-actions">
          <button className="primary" type="button" onClick={onRegister}>Зарегистрироваться</button>
          <button className="secondary" type="button" onClick={onClose}>Позже</button>
        </div>
      </section>
    </div>
  );
}

function App() {
  const saved = loadSaved();
  const [loading, setLoading] = useState(true);
  const [authMode, setAuthMode] = useState("choice");
  const [formMode, setFormMode] = useState("register");
  const [user, setUserState] = useState(saved.user || null);
  const [modal, setModal] = useState(false);
  const [appKey, setAppKey] = useState(0);

  useEffect(() => {
    const timer = setTimeout(() => setLoading(false), 1800);
    return () => clearTimeout(timer);
  }, []);

  function setUser(nextUser) {
    setUserState(nextUser);
    saveSaved({ user: nextUser });
  }

  function home() {
    if (window.hurmaGoHome) window.hurmaGoHome();
    if (!user) {
      setAuthMode("choice");
      setFormMode("register");
    }
    setAppKey((key) => key + 1);
  }

  function logout() {
    setUser(null);
    setAuthMode("choice");
    setAppKey((key) => key + 1);
  }

  function authSubmit(data) {
    if (data.mode === "guest") {
      setUser({ id: "guest", role: "client", name: "Гость ХурМа", city: "Хургада", searchArea: "Marina", isGuest: true });
      return;
    }
    if (data.mode === "login") {
      setUser({ id: "client-demo", role: data.role, name: data.role === "executor" ? "Демо исполнитель" : "Демо клиент", city: "Хургада", searchArea: "Marina", subscriptionActive: true, category: "Трансфер" });
      return;
    }
    setUser({ id: Date.now().toString(), role: data.role, name: data.name, email: data.email, city: data.city, searchArea: data.searchArea, subscriptionActive: true, category: data.category });
  }

  if (loading) return <LoadingScreen />;

  return (
    <div className="app-shell" key={appKey}>
      <Header user={user} onHome={home} onLogout={logout} />
      <main className="main">
        {!user && authMode === "choice" ? (
          <AuthChoice onLogin={() => { setFormMode("login"); setAuthMode("form"); }} onRegister={() => { setFormMode("register"); setAuthMode("form"); }} onGuest={() => authSubmit({ mode: "guest" })} />
        ) : null}
        {!user && authMode === "form" ? <AuthForm mode={formMode} setMode={setFormMode} onBack={() => setAuthMode("choice")} onSubmit={authSubmit} /> : null}
        {user ? <Workspace user={user} setUser={setUser} onRequireSubscription={() => setModal(true)} /> : null}
      </main>
      {modal ? <SubscriptionModal onClose={() => setModal(false)} onRegister={() => { setModal(false); setUser(null); setAuthMode("form"); setFormMode("register"); }} /> : null}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);

    </script>
  </body>
